x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.roboclaw:/root/.roboclaw

x-g1-common-config: &g1-common-config
  <<: *common-config
  network_mode: host
  entrypoint: ["/bin/bash", "-lc"]

services:
  roboclaw-gateway:
    container_name: roboclaw-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  roboclaw-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

  roboclaw-g1-cli:
    <<: *g1-common-config
    profiles:
      - g1
    command: ['. /root/.roboclaw/g1/env.sh && roboclaw status']
    stdin_open: true
    tty: true

  roboclaw-g1-agent:
    container_name: roboclaw-g1-agent
    <<: *g1-common-config
    profiles:
      - g1
    command: ['. /root/.roboclaw/g1/env.sh && roboclaw agent']
    stdin_open: true
    tty: true

  roboclaw-g1-gateway:
    container_name: roboclaw-g1-gateway
    <<: *g1-common-config
    profiles:
      - g1
    command: ['. /root/.roboclaw/g1/env.sh && roboclaw gateway']
    restart: unless-stopped
